name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "android/**"
      - ".github/workflows/android-build-apk.yml"

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android
    steps:
      - uses: actions/checkout@v4
      - name: Restore Android source
        run: |
          cat source-parts/part-*.b64 | base64 --decode > /tmp/formaflow-android.tar.xz
          tar -xJf /tmp/formaflow-android.tar.xz --strip-components=1
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: android-actions/setup-android@v3
      - name: Install Android SDK
        run: yes | sdkmanager "platforms;android-37" "build-tools;36.0.0"
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "9.5.0"
      - name: Build debug APK
        run: gradle :app:assembleDebug --stacktrace
      - uses: actions/upload-artifact@v4
        with:
          name: FormaFlow-Android-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
